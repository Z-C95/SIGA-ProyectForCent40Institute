{% load static %}

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}SIGA — Admin{% endblock %}</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- CSS personalizado -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="{% if request.COOKIES.dark_mode == 'true' %}dark-mode{% endif %}">

<!-- NAVBAR SUPERIOR -->
<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand" href="{% url 'asistencias:admin_dashboard' %}">
    SIGA
  </a>

  <div class="d-flex align-items-center text-white">
    Hola, {{ request.user.username }} (Administrativo)

    <a href="{% url 'asistencias:editar_perfil' %}" class="btn btn-sm btn-outline-light ms-3">
      <i class="bi bi-person-circle"></i> Perfil
    </a>

    <form method="post"
          action="{% url 'logout' %}"
          class="ms-2">
      {% csrf_token %}
      <button type="submit" class="btn btn-sm btn-outline-danger">
        <i class="bi bi-box-arrow-right"></i> Cerrar sesión
      </button>
    </form>
  </div>
</nav>

<!-- CONTENEDOR PRINCIPAL -->
<div class="container-fluid">
  <div class="row">

    <!-- PANEL LATERAL -->
    <div class="col-md-2 col-lg-2 bg-light border-end min-vh-100 p-3">

      <h6 class="text-uppercase text-muted mb-3">Menú</h6>

      <ul class="nav flex-column">

        <!-- Dashboard -->
        <li class="nav-item mb-1">
          <a class="nav-link d-flex align-items-center {% if request.resolver_match.url_name == 'admin_dashboard' %}active fw-bold text-primary{% endif %}"
             href="{% url 'asistencias:admin_dashboard' %}">
            <i class="bi bi-speedometer2 me-2"></i> Dashboard
          </a>
        </li>

        <!-- Usuarios -->
        <li class="nav-item mb-1">
          <a class="nav-link d-flex align-items-center {% if request.resolver_match.url_name == 'usuarios_lista' %}active fw-bold text-primary{% endif %}"
             href="{% url 'asistencias:usuarios_lista' %}">
            <i class="bi bi-people me-2"></i> Usuarios
          </a>
        </li>

        <!-- Carreras -->
        <li class="nav-item mb-1">
          <a class="nav-link d-flex align-items-center {% if request.resolver_match.url_name == 'carreras_lista' %}active fw-bold text-primary{% endif %}"
             href="{% url 'asistencias:carreras_lista' %}">
            <i class="bi bi-mortarboard me-2"></i> Carreras
          </a>
        </li>

        <!-- Materias -->
        <li class="nav-item mb-1">
          <a class="nav-link d-flex align-items-center {% if request.resolver_match.url_name == 'materias_lista' %}active fw-bold text-primary{% endif %}"
             href="{% url 'asistencias:materias_lista' %}">
            <i class="bi bi-journal-text me-2"></i> Materias
          </a>
        </li>

        <!-- Reportes -->
        <li class="nav-item mb-1">
          <a class="nav-link d-flex align-items-center {% if request.resolver_match.url_name == 'reportes_curso' %}active fw-bold text-primary{% endif %}"
             href="{% url 'asistencias:reportes_curso' %}">
            <i class="bi bi-graph-up me-2"></i> Reportes
          </a>
        </li>

        <!-- Justificativos -->
        <li class="nav-item mb-1">
          <a class="nav-link d-flex align-items-center {% if request.resolver_match.url_name == 'lista_justificativos' %}active fw-bold text-primary{% endif %}"
             href="{% url 'asistencias:lista_justificativos' %}">
            <i class="bi bi-file-earmark-text me-2"></i> Justificativos
          </a>
        </li>

      </ul>

    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="col-md-10 col-lg-10 p-4">
      {% block content %}
      {% endblock %}
    </div>

  </div>
</div>

</body>
</html>
