{% extends "base.html" %}
{% block title %}Mis cursos{% endblock %}
{% block content %}
<h1 class="h4 mb-3">Mis comisiones</h1>
<table class="table table-bordered table-striped">
  <thead><tr><th>Materia</th><th>Periodo</th><th>Acciones</th></tr></thead>
  <tbody>
  {% for c in cursos %}
    <tr>
      <td>{{ c.materia.nombre }}</td>
      <td>{{ c.periodo.id }}</td>
      <td><a class="btn btn-sm btn-primary" href="{% url 'asistencias:marcar_asistencia' c.id %}">Marcar asistencia</a></td>
    </tr>
  {% empty %}
    <tr><td colspan="3" class="text-center text-muted">Sin comisiones.</td></tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
